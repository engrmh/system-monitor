<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="node_modules/toastify-js/src/toastify.css" />

    <title>System Monitor</title>

    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body class="bg-slate-50 text-slate-800">
    <div class="max-w-7xl mx-auto p-6 space-y-6">
      <!-- HEADER -->

      <header class="md:flex items-center justify-between">
        <div class="flex items-center gap-4">
          <div
            class="w-11 h-11 rounded-xl bg-blue-600 flex items-center justify-center text-white shadow"
          >
            <i data-lucide="cpu"></i>
          </div>

          <div>
            <h1 class="font-semibold text-lg">System Monitor</h1>
            <p class="text-sm text-slate-500">Realtime telemetry dashboard</p>
          </div>
        </div>

        <div
          class="flex items-center gap-2 bg-white border rounded-full px-4 py-2 shadow-sm w-fit mt-2 md:mt-0"
        >
          <span
            id="statusDot"
            class="w-2 h-2 bg-yellow-400 rounded-full"
          ></span>
          <span
            id="statusText"
            class="text-xs font-semibold text-slate-500 uppercase"
          >
            Connecting
          </span>
        </div>
      </header>

      <!-- GRID -->

      <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <!-- CPU OVERVIEW -->

        <section
          class="lg:col-span-5 bg-white rounded-2xl shadow-sm border p-6 space-y-5"
        >
          <div class="flex justify-between items-center">
            <div class="flex items-center gap-2 font-semibold">
              <i data-lucide="cpu" class="w-5 h-5 text-blue-600"></i>
              <span>CPU Overview</span>
            </div>
          </div>

          <div class="flex items-center justify-between">
            <div>
              <div id="cpuPercent" class="text-4xl font-bold">0%</div>
              <p class="text-sm text-slate-500">Total Usage</p>
            </div>

            <div class="relative w-20 h-20">
              <div
                id="cpuGauge"
                class="w-20 h-20 rounded-full bg-[conic-gradient(#2563eb_0deg,#e2e8f0_0deg)] flex items-center justify-center"
              >
                <div
                  class="w-14 h-14 bg-white rounded-full flex items-center justify-center"
                >
                  <i data-lucide="activity" class="w-4 h-4 text-blue-600"></i>
                </div>
              </div>
            </div>
          </div>

          <div class="text-sm space-y-2">
            <div class="flex justify-between flex-wrap lg:flex-nowrap">
              <span class="text-slate-500">Model</span>
              <span id="cpuModel">-</span>
            </div>

            <div class="flex justify-between">
              <span class="text-slate-500">Cores</span>
              <span id="cpuCores">-</span>
            </div>

            <div class="flex justify-between">
              <span class="text-slate-500">Architecture</span>
              <span id="cpuArch">-</span>
            </div>
          </div>
        </section>

        <!-- PER CORE -->

        <section
          class="lg:col-span-7 bg-white rounded-2xl shadow-sm border p-6"
        >
          <div class="flex items-center gap-2 font-semibold mb-4">
            <i data-lucide="layers" class="w-5 h-5 text-emerald-600"></i>
            <span>Per‑Core Usage</span>
          </div>

          <div
            id="coresContainer"
            class="grid grid-cols-2 lg:grid-cols-4 gap-4"
          ></div>
        </section>

        <!-- MEMORY -->

        <section
          class="lg:col-span-4 bg-white rounded-2xl shadow-sm border p-6 space-y-4"
        >
          <div class="flex items-center justify-between">
            <div class="flex gap-2 items-center font-semibold">
              <i data-lucide="database" class="w-5 h-5 text-purple-600"></i>
              <span>Memory</span>
            </div>

            <span id="memPercent" class="text-xs font-semibold text-slate-500">
              0%
            </span>
          </div>

          <div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
            <div id="memProgress" class="h-3 bg-blue-600 w-0"></div>
          </div>

          <div class="grid grid-cols-3 text-sm text-center gap-2">
            <div>
              <p class="text-slate-500">Total</p>
              <p id="totalMem" class="font-semibold">-</p>
            </div>

            <div>
              <p class="text-slate-500">Used</p>
              <p id="usedMem" class="font-semibold text-red-500">-</p>
            </div>

            <div>
              <p class="text-slate-500">Free</p>
              <p id="freeMem" class="font-semibold text-green-600">-</p>
            </div>
          </div>
        </section>

        <!-- STORAGE -->

        <section
          class="lg:col-span-4 bg-white rounded-2xl shadow-sm border p-6"
        >
          <div class="flex items-center gap-2 font-semibold mb-4">
            <i data-lucide="hard-drive" class="w-5 h-5 text-orange-500"></i>
            <span>Storage</span>
          </div>

          <div id="diskContainer" class="space-y-4"></div>
        </section>

        <!-- NETWORK -->

        <section
          class="lg:col-span-4 bg-white rounded-2xl shadow-sm border p-6"
        >
          <div class="flex items-center gap-2 font-semibold mb-4">
            <i data-lucide="wifi" class="w-5 h-5 text-cyan-600"></i>
            <span>Network</span>
          </div>

          <div id="networkList" class="space-y-3"></div>
        </section>

        <!-- SYSTEM -->

        <section
          class="lg:col-span-12 bg-white rounded-2xl shadow-sm border p-6"
        >
          <div class="flex items-center gap-2 font-semibold mb-4">
            <i data-lucide="terminal" class="w-5 h-5 text-slate-600"></i>
            <span>System Info</span>
          </div>

          <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 text-sm">
            <div>
              <p class="text-slate-500">Hostname</p>
              <p id="hostname">-</p>
            </div>

            <div>
              <p class="text-slate-500">Platform</p>
              <p id="platform">-</p>
            </div>

            <div>
              <p class="text-slate-500">Uptime</p>
              <p id="uptime">-</p>
            </div>

            <div>
              <p class="text-slate-500">Temp Dir</p>
              <p id="tmpDir">-</p>
            </div>
          </div>
        </section>
      </div>
    </div>
    <footer class="w-full text-center py-5">
      <h1 class="font-bold mb-4">Created By Engr.MH</h1>
      <div class="flex justify-center items-center gap-x-3">
        <a
          href="https://github.com/engrmh"
          class="border border-gray-400 bg-white p-3 rounded-xl group transition-all!"
        >
          <img
            class="group-hover:scale-110"
            src="https://cdn.jsdelivr.net/gh/glincker/thesvg@main/public/icons/github/mono.svg"
            alt="GitHub"
            width="24"
            height="24"
          />
        </a>
        <a
          href="https://t.me/engr_mh"
          class="border border-gray-400 bg-white p-3 rounded-xl group transition-all!"
        >
          <img
            class="group-hover:scale-110"
            src="https://cdn.jsdelivr.net/gh/glincker/thesvg@main/public/icons/telegram/default.svg"
            alt="Telegram"
            width="24"
            height="24"
          />
        </a>
        <a
          href="http://skylax.vercel.app/"
          class="border border-gray-400 bg-white p-3 rounded-xl group transition-all!"
        >
          <img
            class="group-hover:scale-110"
            src="https://cdn.jsdelivr.net/gh/glincker/thesvg@main/public/icons/vercel/mono.svg"
            alt="Vercel"
            width="24"
            height="24"
          />
        </a>
        <a
          href="https://instagram.com/engr.mh"
          class="border border-gray-400 bg-white p-3 rounded-xl group transition-all!"
        >
          <img
            class="group-hover:scale-110"
            src="https://cdn.jsdelivr.net/gh/glincker/thesvg@main/public/icons/instagram/default.svg"
            alt="Instagram"
            width="24"
            height="24"
          />
        </a>
        <a
          href="https://www.linkedin.com/in/mohammad-hosein-salimbahrami"
          class="border border-gray-400 bg-white p-3 rounded-xl group transition-all!"
        >
          <img
            class="group-hover:scale-110"
            src="https://cdn.jsdelivr.net/gh/glincker/thesvg@main/public/icons/linkedin/default.svg"
            alt="LinkedIn"
            width="24"
            height="24"
          />
        </a>
      </div>
    </footer>

    <script type="module" src="./assets/js/script.js"></script>
  </body>
</html>
